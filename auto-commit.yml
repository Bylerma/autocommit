# GitHub Auto-Commit Workflow
# Generated by GitHub Auto-Commit Tool
name: Auto Commit Streak Keepalive

on:
  schedule:
    # Runs based on user configuration
    - cron: '0 9,21 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  auto-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Crucial permission for pushing commits
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Auto-Commit Script
        env:
          COMMIT_INTENSITY: ${{ vars.COMMIT_INTENSITY || '3' }}
        run: node .github/scripts/auto-commit.js

      - name: Push changes
        run: |
          git push origin HEAD:main
